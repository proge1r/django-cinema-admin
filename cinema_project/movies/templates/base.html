<!DOCTYPE html>
<html>
<head>
    <title>Cinema Catalog</title>
</head>
<body>
    <nav>
        <a href="/">Home</a> | 
        {% if user.is_authenticated %}
            Hello, {{ user.username }}! <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a> | <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>
    <hr>
    {% block content %}
    {% endblock %}
</body>
</html>
